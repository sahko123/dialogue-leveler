name: Release

# Runs when you push a version tag, e.g.: git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  build-windows:
    name: Build and package (Windows x64)
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Validate tag format
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ($env:TAG_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Tag '$env:TAG_NAME' is not a valid vMAJOR.MINOR.PATCH tag"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Cache the JUCE source download — ~450 MB, only re-fetched when JUCE version changes.
      # Key is pinned to the JUCE tag rather than CMakeLists.txt hash so that bumping the
      # plugin version number (which changes CMakeLists.txt) does not invalidate the cache.
      # IMPORTANT: when bumping JUCE, update BOTH this key and the GIT_TAG SHA in CMakeLists.txt.
      - name: Cache JUCE download
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.14-${{ runner.os }}

      - name: Validate JUCE cache
        shell: pwsh
        run: |
          $juceDir = "build/_deps/juce-src"
          if ((Test-Path $juceDir) -and -not (Test-Path "$juceDir/CMakeLists.txt")) {
            Write-Warning "JUCE cache appears partial — removing to force a clean download"
            Remove-Item -Recurse -Force "build/_deps"
          }

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_CONFIGURATION_TYPES=Release

      - name: Build VST3
        run: cmake --build build --config Release --parallel

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Strip the leading 'v' from the tag (v1.0.0 → 1.0.0)
      - name: Get version from tag
        id: version
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $v = $env:TAG_NAME -replace '^v', ''
          if (-not $v) { Write-Error "Empty version string after stripping tag prefix"; exit 1 }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify VST3 artifact
        shell: pwsh
        run: |
          $dll = "build\DialogueLeveler_artefacts\Release\VST3\DialogueLeveler.vst3\Contents\x86_64-win\DialogueLeveler.vst3"
          if (-not (Test-Path $dll)) { throw "VST3 artifact not found: $dll" }

      - name: Build installer
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          iscc /DAppVersion="$env:VERSION" installer\DialogueLeveler.iss

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if (-not $env:VERSION) { Write-Error "VERSION is empty"; exit 1 }
          $artifact = "installer_output/DialogueLeveler-$env:VERSION-Windows-Setup.exe"
          if (-not (Test-Path $artifact)) { Write-Error "Installer not found: $artifact"; exit 1 }
          gh release create $env:TAG_NAME `
            --title "Dialogue Leveler $env:VERSION" `
            --generate-notes `
            --draft `
            $artifact
          if ($LASTEXITCODE -ne 0) { Write-Error "gh release create failed"; exit 1 }
          gh release edit $env:TAG_NAME --draft=false
          if ($LASTEXITCODE -ne 0) { Write-Error "Failed to publish release — draft not removed"; exit 1 }
