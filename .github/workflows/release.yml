name: Release

# Runs when you push a version tag, e.g.: git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  build-windows:
    name: Build and package (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Validate tag format
        shell: pwsh
        run: |
          if ('${{ github.ref_name }}' -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Tag '${{ github.ref_name }}' is not a valid vMAJOR.MINOR.PATCH tag"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Cache the JUCE source download — ~450 MB, only re-fetched when JUCE version changes.
      # Key is pinned to the JUCE tag rather than CMakeLists.txt hash so that bumping the
      # plugin version number (which changes CMakeLists.txt) does not invalidate the cache.
      # IMPORTANT: when bumping JUCE, update BOTH this key and the GIT_TAG SHA in CMakeLists.txt.
      - name: Cache JUCE download
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.14-${{ runner.os }}

      - name: Validate JUCE cache
        shell: pwsh
        run: |
          $juceDir = "build/_deps/juce-src"
          if ((Test-Path $juceDir) -and -not (Test-Path "$juceDir/CMakeLists.txt")) {
            Write-Warning "JUCE cache appears partial — removing to force a clean download"
            Remove-Item -Recurse -Force "build/_deps"
          }

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --parallel

      - name: Install Inno Setup
        run: choco install innosetup --version=6.3.3 --no-progress -y

      # Strip the leading 'v' from the tag (v1.0.0 → 1.0.0)
      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}' -replace '^v', ''
          if (-not $v) { Write-Error "Empty version string after stripping tag prefix"; exit 1 }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify VST3 artifact
        shell: pwsh
        run: |
          $dll = "build\DialogueLeveler_artefacts\Release\VST3\DialogueLeveler.vst3\Contents\x86_64-win\DialogueLeveler.vst3"
          if (-not (Test-Path $dll)) { throw "VST3 artifact not found: $dll" }

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DAppVersion="${{ steps.version.outputs.VERSION }}" installer\DialogueLeveler.iss

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' `
            --title "Dialogue Leveler ${{ steps.version.outputs.VERSION }}" `
            --generate-notes `
            "installer_output/DialogueLeveler-${{ steps.version.outputs.VERSION }}-Windows-Setup.exe"
